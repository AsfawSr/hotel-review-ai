<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section}, ~{::script})}">
<head>
    <title>AI Status</title>
</head>
<body>
<section>
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">AI Status</h1>
            <p class="text-muted mb-0">Connectivity and model readiness for Ollama.</p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="mb-2"><strong>Ollama URL:</strong> <span th:text="${status.baseUrl}">http://localhost:11434</span></div>
            <div class="mb-2"><strong>Configured Model:</strong> <span th:text="${status.model}">llama3.2:latest</span></div>
            <div class="mb-2"><strong>Reachable:</strong>
                <span th:text="${status.reachable ? 'Yes' : 'No'}"
                      th:classappend="${status.reachable ? ' text-success' : ' text-danger'}">Yes</span>
            </div>
            <div class="mb-2"><strong>Model Available:</strong>
                <span th:text="${status.modelAvailable ? 'Yes' : 'No'}"
                      th:classappend="${status.modelAvailable ? ' text-success' : ' text-danger'}">Yes</span>
            </div>
            <div class="alert" th:classappend="${status.reachable && status.modelAvailable ? ' alert-success' : ' alert-warning'}">
                <span th:text="${status.message}">Message</span>
            </div>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
