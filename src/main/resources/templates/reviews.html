<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(pageTitle=~{::title}, content=~{::section}, pageScripts=~{::script})}">
<head>
    <title>Reviews</title>
</head>
<body>
<section>
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Guest Reviews</h1>
            <p class="text-muted mb-0">Browse reviews and AI insights.</p>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="text-muted">Filters: <span th:text="${filters.sentiment}">All</span> / <span th:text="${filters.topic}">All</span></div>
            <form th:action="@{/reviews}" method="get" class="d-flex align-items-center gap-2">
                <label for="size" class="small text-muted mb-0">Per page</label>
                <input type="hidden" name="page" value="0" />
                <select id="size" name="size" class="form-select form-select-sm" onchange="this.form.submit()">
                    <option th:each="s : ${allowedPageSizes}" th:value="${s}" th:text="${s}" th:selected="${s == pageSize}">10</option>
                </select>
            </form>
            <a class="btn btn-sm btn-primary" th:href="@{/reviews/submit}">Submit Review</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <small class="text-muted" th:text="'Total reviews: ' + ${totalElements}">Total reviews: 0</small>
                <small class="text-muted" th:text="'Page ' + (${totalPages == 0 ? 0 : currentPage + 1}) + ' of ' + ${totalPages}">Page 0 of 0</small>
            </div>

            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Guest</th>
                        <th>Rating</th>
                        <th>Sentiment</th>
                        <th>Main Topic</th>
                        <th>Submitted</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(reviews)}">
                        <td colspan="6" class="text-center text-muted">No reviews yet.</td>
                    </tr>
                    <tr th:each="review : ${reviews}">
                        <td th:text="${review.guestName}">Guest</td>
                        <td th:text="${review.rating == null ? 'N/A' : review.rating}">N/A</td>
                        <td>
                            <span th:if="${review.sentiment == null}" class="badge text-bg-secondary">Pending</span>
                            <span th:if="${review.sentiment != null}" class="badge"
                                  th:classappend="${review.sentiment.name() == 'POSITIVE' ? ' text-bg-success' : (review.sentiment.name() == 'NEGATIVE' ? ' text-bg-danger' : ' text-bg-warning') }"
                                  th:text="${review.sentiment}">NEUTRAL</span>
                        </td>
                        <td th:text="${review.mainTopic == null ? 'N/A' : review.mainTopic}">N/A</td>
                        <td th:text="${#temporals.format(review.submittedAt, 'yyyy-MM-dd HH:mm')}">2026-04-03</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/reviews/{id}(id=${review.id})}">View</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav class="mt-3" th:if="${totalPages > 1}" aria-label="Review pagination">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${!hasPrevious} ? ' disabled'">
                        <a class="page-link" th:href="@{/reviews(page=${currentPage - 1},size=${pageSize})}">Previous</a>
                    </li>

                    <li class="page-item" th:each="pageNumber : ${pageNumbers}" th:classappend="${pageNumber == currentPage} ? ' active'">
                        <a class="page-link" th:href="@{/reviews(page=${pageNumber},size=${pageSize})}" th:text="${pageNumber + 1}">1</a>
                    </li>

                    <li class="page-item" th:classappend="${!hasNext} ? ' disabled'">
                        <a class="page-link" th:href="@{/reviews(page=${currentPage + 1},size=${pageSize})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
