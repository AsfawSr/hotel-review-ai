<aside xmlns:th="http://www.thymeleaf.org" th:fragment="navbar" class="app-sidebar text-white p-3 d-flex flex-column">
    <a class="brand mb-4" th:href="@{/dashboard}">HotelReviewAI</a>

    <nav class="nav nav-pills flex-column mb-auto">
        <a class="nav-link" th:href="@{/dashboard}" th:classappend="${#httpServletRequest.requestURI == '/dashboard'} ? ' active'">Dashboard</a>
        <a class="nav-link" th:href="@{/reviews}" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/reviews') && #httpServletRequest.requestURI != '/reviews/submit'} ? ' active'">Reviews</a>
        <a class="nav-link" th:href="@{/reviews/submit}" th:classappend="${#httpServletRequest.requestURI == '/reviews/submit'} ? ' active'">Submit Review</a>
        <a class="nav-link" th:href="@{/ai/status}" th:classappend="${#httpServletRequest.requestURI == '/ai/status'} ? ' active'">AI Status</a>
    </nav>

    <div class="small border-top border-light border-opacity-25 pt-3 mt-3 text-white-50">
        Signed in as <strong class="text-white">Admin</strong>
    </div>
</aside>
