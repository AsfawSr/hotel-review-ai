<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="head">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <style>
        :root {
            --bs-primary: #198754;
            --bs-primary-rgb: 25, 135, 84;
        }

        .app-sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #0f5132 0%, #198754 100%);
        }

        .app-sidebar .brand {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .app-sidebar .nav-link {
            color: rgba(255, 255, 255, 0.9);
            border-radius: 0.5rem;
            padding: 0.55rem 0.75rem;
            margin-bottom: 0.25rem;
        }

        .app-sidebar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.14);
            color: #ffffff;
        }

        .app-sidebar .nav-link.active {
            background-color: rgba(255, 255, 255, 0.24);
            color: #ffffff;
            font-weight: 600;
        }

        .app-sidebar .nav-link-button {
            border: 0;
            background: transparent;
        }

        .app-main {
            background-color: #f8fbf9;
        }

        .dashboard-section {
            max-width: 1280px;
            margin: 0 auto;
        }

        .dashboard-header {
            padding: 0.5rem 0;
        }

        .metric-card {
            border: 0;
            border-radius: 0.9rem;
            box-shadow: 0 6px 18px rgba(15, 81, 50, 0.08);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(15, 81, 50, 0.11);
        }

        .metric-card-accent {
            border-left: 4px solid rgba(25, 135, 84, 0.4);
        }

        .metric-label {
            font-size: 0.86rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .metric-value {
            color: #0f5132;
            font-weight: 700;
        }

        .chart-card {
            border: 0;
            border-radius: 0.9rem;
            box-shadow: 0 6px 18px rgba(15, 81, 50, 0.08);
        }

        .chart-card .card-body {
            min-height: 300px;
        }

        .chart-card canvas {
            max-height: 220px;
        }

        .dashboard-sentiment-card {
            border: 0;
            box-shadow: 0 6px 18px rgba(15, 81, 50, 0.08);
        }
    </style>
</th:block>
