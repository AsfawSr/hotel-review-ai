<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - HotelReviewAI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous" />
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css" />
</head>
<body>
<div class="login-bg">
    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card border-0 shadow-lg login-card">
                    <div class="card-body p-4 p-lg-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 fw-bold mb-1">HotelReviewAI</h1>
                            <p class="text-muted mb-0">Sign in to manage guest insights</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger" role="alert">
                            Invalid username or password. Please try again.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success" role="alert">
                            You have been signed out successfully.
                        </div>

                        <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input id="username"
                                       name="username"
                                       type="text"
                                       class="form-control form-control-lg"
                                       placeholder="Enter your username"
                                       required
                                       autofocus />
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input id="password"
                                       name="password"
                                       type="password"
                                       class="form-control form-control-lg"
                                       placeholder="Enter your password"
                                       required />
                            </div>

                            <button type="submit" class="btn btn-success w-100 btn-lg">Sign In</button>
                        </form>

                        <div class="mt-4 text-center small text-muted">
                            Default access: <strong>admin</strong> / <strong>admin123</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
