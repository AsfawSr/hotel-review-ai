<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section}, ~{::script})}">
<head>
    <title>Submit Review</title>
</head>
<body>
<section>
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Submit a Review</h1>
            <p class="text-muted mb-0">Share your experience and help us improve.</p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/reviews/submit}" th:object="${reviewForm}" method="post" class="row g-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="col-12">
                    <label class="form-label" for="guestName">Guest name</label>
                    <input class="form-control" type="text" id="guestName" th:field="*{guestName}" placeholder="Jane Doe" />
                    <div class="text-danger small" th:if="${#fields.hasErrors('guestName')}" th:errors="*{guestName}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label" for="reviewText">Review</label>
                    <textarea class="form-control" id="reviewText" rows="5" th:field="*{reviewText}" placeholder="Tell us about your stay..."></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('reviewText')}" th:errors="*{reviewText}"></div>
                </div>

                <div class="col-12 col-md-4">
                    <label class="form-label" for="rating">Rating (optional)</label>
                    <select class="form-select" id="rating" th:field="*{rating}">
                        <option value="">Choose...</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Submit Review</button>
                    <a class="btn btn-outline-secondary ms-2" th:href="@{/reviews}">Back to reviews</a>
                </div>
            </form>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
